<!DOCTYPE html>
<html>
<head>
    <title>GTO Drill Trainer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #hand { font-size: 24px; margin-bottom: 20px; }

        .action-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        #feedback { margin-top: 20px; font-size: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(13, 28px);
            grid-template-rows: repeat(13, 28px);
            gap: 2px;
            margin-bottom: 20px;
        }

        .cell {
            width: 28px;
            height: 28px;
            font-size: 10px;
            text-align: center;
            line-height: 28px;
            cursor: pointer;
            border-radius: 3px;
        }

        #hand-info {
            margin-top: 10px;
            font-size: 16px;
            min-height: 60px;
        }
    </style>
</head>
<body>

<!-- Stats -->
<div id="stats" style="margin-bottom: 20px; font-size: 18px;">
    Loading stats…
</div>

<!-- Position selector -->
<select id="pos-select" onchange="loadRange()">
    <option>UTG</option>
    <option>MP</option>
    <option>CO</option>
    <option>BTN</option>
    <option>SB</option>
    <option>BB</option>
</select>

<!-- Heatmap grid -->
<div id="range-grid" class="grid"></div>

<!-- Hand info on hover -->
<div id="hand-info"></div>

<hr>

<h1>GTO Drill Trainer</h1>

<div id="drill">
    <div id="position"></div>
    <div id="action"></div>
    <div id="hand"></div>
</div>

<div id="buttons"></div>

<div id="feedback"></div>

<script>

// I can generate the entire table if you want the full dump.

/* ------------------------------
   DRILL LOGIC
--------------------------------*/

async function fetchDrill() {
    const res = await fetch("/drill");
    const drill = await res.json();

    window.currentDrill = drill;

    document.getElementById("position").innerText = "Position: " + drill.position;
    document.getElementById("action").innerText = "Correct Action: ?";
    document.getElementById("hand").innerText = "Hand: " + drill.hand.map(c => c.rank + c.suit).join(" ");

    renderButtons();
    document.getElementById("feedback").innerText = "";
}

function renderButtons() {
    const actions = ["Open", "Call", "ThreeBet", "FourBet", "Defend"];
    const container = document.getElementById("buttons");
    container.innerHTML = "";

    actions.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "action-btn";
        btn.innerText = a;
        btn.onclick = () => submitAnswer(a);
        container.appendChild(btn);
    });
}

async function submitAnswer(userAction) {
    const payload = {
        position: window.currentDrill.position,
        action: window.currentDrill.action,
        user_action: userAction,
        hand: window.currentDrill.hand
    };

    const res = await fetch("/drill/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    const feedback = document.getElementById("feedback");

    if (result.correct) {
        feedback.innerHTML = `<span style="color: green; font-weight: bold;">Correct!</span>`;
    } else {
        feedback.innerHTML = `
            <span style="color: red; font-weight: bold;">Incorrect</span><br>
            Correct action: <b>${result.action}</b>
        `;
    }

    document.querySelectorAll(".action-btn").forEach(btn => btn.disabled = true);

    setTimeout(fetchNextDrill, 1200);
}

async function fetchNextDrill() {
    await fetchStats();
    const res = await fetch("/drill/next");
    const drill = await res.json();

    window.currentDrill = drill;

    document.getElementById("position").innerText = "Position: " + drill.position;
    document.getElementById("action").innerText = "Correct Action: ?";
    document.getElementById("hand").innerText = "Hand: " + drill.hand.map(c => c.rank + c.suit).join(" ");

    document.getElementById("feedback").innerText = "";
    renderButtons();
}

/* ------------------------------
   STATS
--------------------------------*/

async function fetchStats() {
    const res = await fetch("/stats");
    const s = await res.json();

    document.getElementById("stats").innerHTML =
        `Accuracy: ${(s.accuracy * 100).toFixed(1)}% (${s.correct}/${s.total})`;
}

/* ------------------------------
   HEATMAP
--------------------------------*/

function heatColor(v) {
    const red = Math.floor((1 - v) * 255);
    const green = Math.floor(v * 255);
    return `rgb(${red}, ${green}, 80)`;
}

function renderGrid(matrix, hands) {
    const grid = document.getElementById("range-grid");
    grid.innerHTML = "";

    for (let r = 0; r < 13; r++) {
        for (let c = 0; c < 13; c++) {
            const val = matrix[r][c];
            const hand = hands[r][c];

            const cell = document.createElement("div");
            cell.className = "cell";
            cell.style.background = heatColor(val);
            cell.innerText = hand;

            cell.onmouseover = () => showHandInfo(hand, val);

            grid.appendChild(cell);
        }
    }
}

function showHandInfo(hand, val) {
    document.getElementById("hand-info").innerHTML = `
        <b>${hand}</b><br>
        Frequency: ${(val * 100).toFixed(1)}%
    `;
}

async function loadRange() {
    const pos = document.getElementById("pos-select").value;
    const res = await fetch(`/range/heatmap?position=${pos}`);
    const data = await res.json();
    renderGrid(data.matrix, data.hands);
}

function lookupOdds(hand, type) {
    const entry = PREFLOP_ODDS[hand];
    if (!entry) return "N/A";

    if (type === "random") return (entry.random * 100).toFixed(1);
    if (type === "20") return (entry.top20 * 100).toFixed(1);

    return "N/A";
}


/* ------------------------------
   INITIAL LOAD
--------------------------------*/

fetchStats();
fetchDrill();
loadRange();
</script>

</body>
</html>
